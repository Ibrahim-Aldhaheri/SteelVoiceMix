# Flathub build manifest for SteelVoiceMix GUI.
#
# This packages the **Python/Qt GUI only**. The Rust daemon that talks to
# the base station via HID and manages PipeWire sinks must be installed on
# the host — normally via:
#
#     sudo dnf copr enable abokhalil/steelvoicemix
#     sudo dnf install steelvoicemix
#
# or from source (`./install.sh --no-gui` on the host if you want the
# daemon without a second GUI install). The Flatpak reaches the daemon
# through `$XDG_RUNTIME_DIR/steelvoicemix.sock`, which we bind-mount in.
#
# Why not bundle the daemon? Two reasons:
#   1. udev rules for non-root hidraw access have to live on the host
#      (Flatpaks cannot install udev rules into /etc). So the host
#      already has to do a real install. Adding a sandboxed daemon on
#      top doubles the moving parts.
#   2. Flathub reviewers push back hard on `--device=all`, which the
#      daemon would need for raw HID. Keeping it on the host means we
#      only ask for a narrow socket share, not device access.
#
# Build locally:
#     flatpak install flathub org.kde.Platform//6.7 org.kde.Sdk//6.7
#     flatpak-builder --user --install --force-clean build-dir \
#         flatpak/dev.ibrahimaldhaheri.steelvoicemix.yml
#     flatpak run dev.ibrahimaldhaheri.steelvoicemix

app-id: dev.ibrahimaldhaheri.steelvoicemix
runtime: org.kde.Platform
runtime-version: "6.7"
sdk: org.kde.Sdk
command: steelvoicemix-gui

finish-args:
  # Display. Launcher forces QT_QPA_PLATFORM=xcb for overlay positioning,
  # but we include the Wayland socket too in case the user overrides.
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

  # Access the daemon's Unix socket on the host. Not `--filesystem=host`
  # — only this one socket directory.
  - --filesystem=xdg-run/steelvoicemix.sock

  # Desktop notifications (optional — notify() is best-effort already).
  - --talk-name=org.freedesktop.Notifications

  # No device access, no network, no home read. The GUI doesn't need any
  # of that — everything interesting happens over the socket to the host
  # daemon.

modules:
  # PySide6 + dependencies via pip. Flathub builders run offline, so we
  # need a sources list generated by flatpak-pip-generator — see
  # flatpak/README.md. The manifest references pyside6-sources.json
  # which must be committed alongside this file before a real build.
  - name: python3-pyside6
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index
          --find-links="file://${PWD}"
          --prefix=${FLATPAK_DEST}
          --no-build-isolation
          PySide6-Essentials
    sources:
      # TODO: replace with `- pyside6-sources.json` after running
      # flatpak-pip-generator. The placeholder below is intentionally
      # invalid so an unconfigured build fails early and loudly.
      - type: file
        path: pyside6-sources.json
        dest-filename: pyside6-sources.json
        only-arches: [invalid-arch-so-this-never-matches]

  - name: steelvoicemix-gui
    buildsystem: simple
    build-commands:
      # GUI Python package
      - install -d ${FLATPAK_DEST}/share/steelvoicemix
      - install -Dm644 steelvoicemix-gui.py
          ${FLATPAK_DEST}/share/steelvoicemix/steelvoicemix-gui.py
      - install -d ${FLATPAK_DEST}/share/steelvoicemix/gui
      - install -Dm644 gui/*.py ${FLATPAK_DEST}/share/steelvoicemix/gui/

      # Launcher — force xcb so overlay move() calls are respected, then
      # exec the entry shim which adds its own dir to sys.path.
      - |
        cat > ${FLATPAK_DEST}/bin/steelvoicemix-gui <<'EOF'
        #!/bin/sh
        export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
        exec python3 /app/share/steelvoicemix/steelvoicemix-gui.py "$@"
        EOF
      - chmod 755 ${FLATPAK_DEST}/bin/steelvoicemix-gui

      # Desktop entry (renamed to match the app ID, per Flathub convention)
      - install -Dm644 steelvoicemix.desktop
          ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop

      # AppStream metadata
      - install -Dm644 dev.ibrahimaldhaheri.steelvoicemix.metainfo.xml
          ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml

      # Icons — scalable SVG always; 256×256 PNG required by Flathub and
      # generated via rsvg-convert (see flatpak/README.md).
      - install -Dm644 data/icons/hicolor/scalable/apps/steelvoicemix.svg
          ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm644 data/icons/hicolor/256x256/apps/steelvoicemix.png
          ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
    sources:
      - type: git
        url: https://github.com/Ibrahim-Aldhaheri/SteelVoiceMix.git
        tag: v0.2.2
