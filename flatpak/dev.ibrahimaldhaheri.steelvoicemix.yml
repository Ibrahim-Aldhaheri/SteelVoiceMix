# Flathub build manifest for SteelVoiceMix GUI.
#
# Packages the **Python/Qt GUI only**. The Rust daemon must be installed
# on the host (COPR / source) because:
#   1. Its udev rule for non-root hidraw access has to live in /etc,
#      which a Flatpak can't touch.
#   2. Flathub reviewers don't accept --device=all, which the daemon
#      would need for raw HID.
# The Flatpak reaches the host daemon via `$XDG_RUNTIME_DIR/steelvoicemix.sock`.
#
# PySide6 comes from the Flathub baseapp io.qt.PySide.BaseApp — that's
# the vendor-blessed path for PySide6 apps on Flathub (the upstream
# flatpak-pip-generator actively refuses to bundle PySide6 and points
# you at the baseapp).
#
# Build locally:
#     flatpak install flathub org.kde.Platform//6.7 org.kde.Sdk//6.7 \
#         io.qt.PySide.BaseApp//6.7
#     flatpak-builder --user --install --force-clean build-dir \
#         flatpak/dev.ibrahimaldhaheri.steelvoicemix.yml
#     flatpak run dev.ibrahimaldhaheri.steelvoicemix

app-id: dev.ibrahimaldhaheri.steelvoicemix
runtime: org.kde.Platform
runtime-version: "6.7"
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: "6.7"
command: steelvoicemix-gui

finish-args:
  # Display. Launcher forces QT_QPA_PLATFORM=xcb for overlay positioning,
  # but we include the Wayland socket in case the user overrides.
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

  # Access the daemon's Unix socket on the host. Not `--filesystem=host`
  # — only this one socket path.
  - --filesystem=xdg-run/steelvoicemix.sock

  # Desktop notifications (optional — notify() is best-effort already).
  - --talk-name=org.freedesktop.Notifications

  # No device access, no network, no home read. Everything interesting
  # happens over the socket to the host daemon.

# cleanup: items the baseapp drops after the baseapp module has been
# merged into /app. These keep the final app small and are the pattern
# Flathub's PySide apps follow (see flathub/io.qt.PySide.BaseApp#readme).
cleanup:
  - /lib/debug

modules:
  - name: steelvoicemix-gui
    buildsystem: simple
    build-commands:
      # GUI Python package
      - install -d ${FLATPAK_DEST}/share/steelvoicemix
      - install -Dm644 steelvoicemix-gui.py
          ${FLATPAK_DEST}/share/steelvoicemix/steelvoicemix-gui.py
      - install -d ${FLATPAK_DEST}/share/steelvoicemix/gui
      - install -Dm644 gui/*.py ${FLATPAK_DEST}/share/steelvoicemix/gui/

      # Launcher — forces xcb so overlay move() calls are respected, then
      # execs the entry shim which adds its own dir to sys.path.
      - |
        cat > ${FLATPAK_DEST}/bin/steelvoicemix-gui <<'EOF'
        #!/bin/sh
        export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
        exec python3 /app/share/steelvoicemix/steelvoicemix-gui.py "$@"
        EOF
      - chmod 755 ${FLATPAK_DEST}/bin/steelvoicemix-gui

      # Desktop entry (renamed to match the app ID — Flathub convention)
      - install -Dm644 steelvoicemix.desktop
          ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop

      # AppStream metadata
      - install -Dm644 dev.ibrahimaldhaheri.steelvoicemix.metainfo.xml
          ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml

      # Icons — scalable SVG + 256×256 PNG. The PNG is required by Flathub
      # review; generate with rsvg-convert (see flatpak/README.md).
      - install -Dm644 data/icons/hicolor/scalable/apps/steelvoicemix.svg
          ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm644 data/icons/hicolor/256x256/apps/steelvoicemix.png
          ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
    sources:
      - type: git
        url: https://github.com/Ibrahim-Aldhaheri/SteelVoiceMix.git
        tag: v0.2.2
