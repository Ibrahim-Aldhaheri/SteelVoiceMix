name: Dependabot auto-merge

# Auto-merges Dependabot PRs into whatever branch they target (dev per
# dependabot.yml) once CI goes green — but only for patch and minor
# bumps. Major version bumps wait for manual review.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch update metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for patch/minor bumps
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
