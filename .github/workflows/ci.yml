name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust build + test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # linux-native-basic-udev in hidapi dlopens libudev at runtime; the
      # dev header package is still the simplest way to satisfy pkg-config
      # probes that some transitive crates run during their build.rs.
      - name: Install libudev headers
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release --locked

      - name: cargo test
        run: cargo test --locked --all-targets

      - name: cargo clippy (warnings are errors)
        run: cargo clippy --all-targets --no-deps --locked -- -D warnings

  python:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: py_compile all modules
        # Walks every .py under the repo (entry shims, gui/, gui/tabs/,
        # CLI). Catches syntax errors in any tab module, not just the
        # top-level gui/ package.
        run: |
          set -e
          find . -name '*.py' -not -path './target/*' -not -path './.git/*' -print0 \
            | xargs -0 python3 -m py_compile
      - name: Validate translation .ts XML
        # The Qt linguist .ts files are XML; a malformed entry would
        # crash the GUI's QTranslator at startup. Cheap to check here.
        run: |
          set -e
          for ts in gui/translations/*.ts; do
            python3 -c "import xml.etree.ElementTree as ET; ET.parse('$ts')"
          done
