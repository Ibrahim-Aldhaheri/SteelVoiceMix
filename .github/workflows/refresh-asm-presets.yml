name: Refresh ASM presets

# Pulls the latest preset library from loteran/Arctis-Sound-Manager,
# converts each preset into our EqBand JSON shape, seeds default
# runtime-name aliases for any new presets that don't yet have a
# manual override entry, then opens a PR against `dev` if anything
# changed. Maintainer-merged after refining aliases.
#
# Runs weekly (Monday 06:00 UTC — same cadence as the security audit
# cron, so any preset churn shows up alongside the dependency report).
# `workflow_dispatch` lets the maintainer trigger an on-demand
# refresh from the Actions tab.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

# The PR-opening action needs to push a branch and open a PR. Keep
# the rest read-only.
permissions:
  contents: write
  pull-requests: write

concurrency:
  # One refresh at a time. If a manual run lands while the cron is
  # still going, queue rather than racing the same branch.
  group: refresh-asm-presets
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh + alias-seed + PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v6
        with:
          ref: dev
          # Don't leave the checkout token in .git/config. Otherwise
          # create-pull-request adds its own Authorization header on
          # top, and newer git rejects the duplicate ("Duplicate
          # header: Authorization" → HTTP 400) on remote operations.
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Pull latest ASM presets
        # The script is idempotent — re-running just overwrites the
        # bundled set with upstream's current state. --ref main pins
        # to the upstream main branch (not a tag, since ASM doesn't
        # release on a fixed cadence).
        run: python3 scripts/fetch_asm_presets.py --ref main

      - name: Seed runtime alias stubs for new presets
        # Adds a "Display Name": "[ASM] Display Name" entry for any
        # new bundled preset that doesn't already have an alias
        # (manual aliases like `r6.exe → [ASM] Rainbow Six Siege`
        # are preserved). Sorts each channel's keys for stable PR
        # diffs; some minor churn the first time this runs is OK.
        run: python3 scripts/seed_alias_stubs.py

      - name: Validate JSON + .ts XML
        # Belt-and-braces — if either script wrote malformed JSON
        # the PR shouldn't get opened.
        run: |
          set -e
          python3 -c "import json; json.load(open('gui/presets/runtime_aliases.json'))"
          for f in gui/presets/asm/*/*.json; do
            python3 -c "import json; json.load(open('$f'))"
          done

      - name: Compute diff summary
        # Counts what changed in `gui/presets/` so the PR body can
        # show high-level stats above the per-file diff. Reviewer
        # sees scope at a glance ("12 added, 3 modified, 5 aliases")
        # instead of scrolling through the file list to count.
        id: diff_summary
        run: |
          set -e
          # `git status --porcelain` lines: XY <path>
          #   A  = added (staged) — but we haven't staged yet, so:
          #   ?? = untracked (new file)
          #    M = modified, unstaged
          #    D = deleted, unstaged
          presets_added=$(git status --porcelain gui/presets/asm/ | grep -c '^??' || true)
          presets_modified=$(git status --porcelain gui/presets/asm/ | grep -c '^ M' || true)
          presets_removed=$(git status --porcelain gui/presets/asm/ | grep -c '^ D' || true)
          # Alias delta: count how many keys were added across all
          # channels by diffing the JSON in-memory (more reliable
          # than line-counting a sorted file).
          alias_delta=$(python3 - <<'PY'
          import json, subprocess
          path = "gui/presets/runtime_aliases.json"
          new = json.load(open(path))
          # Compare against HEAD's version of the file. If git show
          # fails (file is brand new), fall back to empty baseline.
          try:
              old_raw = subprocess.check_output(
                  ["git", "show", f"HEAD:{path}"], text=True,
              )
              old = json.loads(old_raw)
          except Exception:
              old = {}
          delta = 0
          for ch in ("game", "chat", "mic"):
              before = set((old.get(ch) or {}).keys())
              after = set((new.get(ch) or {}).keys())
              delta += len(after - before)
          print(delta)
          PY
          )
          {
            echo "presets_added=$presets_added"
            echo "presets_modified=$presets_modified"
            echo "presets_removed=$presets_removed"
            echo "alias_delta=$alias_delta"
          } >> "$GITHUB_OUTPUT"

      - name: Open PR if anything changed
        # Pull-requests action handles the "no changes → no PR"
        # decision automatically. Branch is reused across runs so
        # repeated refreshes update an open PR rather than piling
        # up stale ones; old `delete-branch: true` cleans the
        # branch when the PR is merged or closed.
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: dev
          branch: deps/asm-preset-refresh
          delete-branch: true
          commit-message: |
            deps(presets): weekly ASM preset refresh + alias stubs

            Auto-generated by .github/workflows/refresh-asm-presets.yml.
            Refine the new alias entries (add .exe variants, alternate
            runtime names) before merging.
          title: "deps(presets): weekly ASM preset refresh + alias stubs"
          body: |
            Automated by `.github/workflows/refresh-asm-presets.yml`.

            ## Summary

            | Change | Count |
            |---|---:|
            | Presets added | ${{ steps.diff_summary.outputs.presets_added }} |
            | Presets modified | ${{ steps.diff_summary.outputs.presets_modified }} |
            | Presets removed | ${{ steps.diff_summary.outputs.presets_removed }} |
            | New aliases | ${{ steps.diff_summary.outputs.alias_delta }} |

            ## What changed
            - Pulled latest preset snapshot from
              [`loteran/Arctis-Sound-Manager`](https://github.com/loteran/Arctis-Sound-Manager)
              into `gui/presets/asm/`.
            - Seeded default `"<DisplayName>": "[ASM] <DisplayName>"`
              entries in `gui/presets/runtime_aliases.json` for any
              presets that didn't already have an alias.
            - Existing manual aliases (e.g. `r6.exe → [ASM] Rainbow Six Siege`)
              are preserved.

            ## What to do before merging
            1. Spot-check the new presets aren't garbage (open a few
               diffs in `gui/presets/asm/game/` and confirm they look
               like real EQ band data).
            2. Refine new aliases in `gui/presets/runtime_aliases.json`.
               Defaults match the preset's display name only — add
               `.exe` and alternate-name variants where users will
               see them in PipeWire's `application.name`.
            3. CI must be green (Rust + Python + .ts XML).
            4. Merge into `dev`. Stable release happens at maintainer
               discretion per `feedback_releases.md`.

            Triggered by: ${{ github.event_name }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          labels: |
            deps
            auto-generated
