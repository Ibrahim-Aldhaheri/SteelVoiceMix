name: Copr Dev

# Builds an alpha-channel package on every push to dev. Mirrors
# copr-release.yml but targets the abokhalil/steelvoicemix-dev COPR
# project, which the user configures separately to pull from this
# branch via rpkg with a versioned-by-sha spec.
#
# To set up the dev COPR project (one-time):
#   1. Visit https://copr.fedorainfracloud.org/coprs/abokhalil/steelvoicemix-dev
#      → Settings → Edit project (create it first if missing).
#   2. Chroots: same as stable (Fedora 43, rawhide).
#   3. "Build options": enable "Net" (cargo needs network).
#   4. Packages → Add new package → name `steelvoicemix`,
#      source type "Custom", script:
#          ```
#          # Builds an SRPM directly from the dev branch using rpkg.
#          # `dnf install rpkg-util` is preinstalled on COPR builders.
#          git clone --depth=50 https://github.com/Ibrahim-Aldhaheri/SteelVoiceMix.git
#          cd SteelVoiceMix
#          git checkout dev
#          rpkg srpm --spec steelvoicemix-dev.spec --outdir "$outdir"
#          ```
#      (or, equivalently, configure auto-rebuild on git ref `dev`).
#   5. Generate an API token at https://copr.fedorainfracloud.org/api
#      and store the contents of ~/.config/copr as a GitHub secret
#      named COPR_CONFIG (already present from the release workflow).

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  copr-dev-build:
    runs-on: ubuntu-latest
    steps:
      - name: Install copr-cli
        run: pip install --user copr-cli

      - name: Write COPR credentials
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          mkdir -p ~/.config
          printf '%s' "$COPR_CONFIG" > ~/.config/copr
          chmod 600 ~/.config/copr

      - name: Trigger rebuild for dev @ ${{ github.sha }}
        # `build-package` re-runs whatever source method the COPR
        # project is configured with (SCM with rpkg method on the
        # dev spec). The package was renamed from `steelvoicemix` to
        # `steelvoicemix-dev` so users can `dnf install steelvoicemix-dev`
        # without overlapping with the stable `steelvoicemix` package.
        run: copr-cli build-package abokhalil/steelvoicemix-dev --name steelvoicemix-dev
