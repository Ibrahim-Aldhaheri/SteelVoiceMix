<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4a6a"/>
      <stop offset="100%" stop-color="#1a2438"/>
    </linearGradient>
    <linearGradient id="dialGrad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2196F3"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bgGrad)"/>

  <g filter="url(#dropShadow)">
    <!-- Headphone band -->
    <path d="M 72 124 A 56 56 0 0 1 184 124"
          fill="none" stroke="#eceff4" stroke-width="12" stroke-linecap="round"/>

    <!-- Left earcup -->
    <rect x="52" y="120" width="36" height="56" rx="12" fill="#eceff4"/>
    <rect x="58" y="126" width="24" height="44" rx="8" fill="#9ba3b4"/>

    <!-- Right earcup -->
    <rect x="168" y="120" width="36" height="56" rx="12" fill="#eceff4"/>
    <rect x="174" y="126" width="24" height="44" rx="8" fill="#9ba3b4"/>
  </g>

  <!-- Dial ring (split green/blue = Game/Chat) -->
  <circle cx="128" cy="200" r="34"
          fill="#1a2438"
          stroke="url(#dialGrad)" stroke-width="8"/>

  <!-- Dial indicator notch -->
  <rect x="123" y="168" width="10" height="14" rx="2" fill="url(#dialGrad)"/>

  <!-- Dial centre dot -->
  <circle cx="128" cy="200" r="5" fill="#eceff4"/>
</svg>
